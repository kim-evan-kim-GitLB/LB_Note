# meetscript-ai 온프레미스 배포 (171 서버, 별도 컨테이너)
#
# 사전 준비
#   1) 호스트에 nvidia-container-toolkit 설치(컨테이너 GPU 패스스루).
#   2) STT 모델 가중치(3.9G)를 호스트 경로에 두고 MODELS_DIR 로 지정.
#   3) deploy/.env.deploy 작성(.env.deploy.example 복사 후 비밀값 채우기).
#   4) 프론트 repo 경로 확인: build.additional_contexts.frontendsrc.
#
# 빌드+기동:  cd deploy && docker compose --env-file .env.deploy up -d --build
# 로그:       docker compose --env-file .env.deploy logs -f
# 접속:       http://<171-LAN-IP>:49152   (HTTP, 인증서 없음)
# 주의: BACKEND_DIR/FRONTEND_DIR/MODELS_DIR 는 빌드·볼륨 경로 치환에 쓰이므로
#       반드시 --env-file .env.deploy 로 넘겨야 합니다(env_file: 만으로는 치환 안 됨).

services:
  meetscript:
    build:
      # 호스트에서 git clone 한 백엔드 repo 루트. (기본값은 개발 컨테이너 기준)
      context: ${BACKEND_DIR:-..}
      dockerfile: deploy/Dockerfile
      additional_contexts:
        # 호스트에서 git clone 한 프론트엔드 repo 경로(별도 repo).
        frontendsrc: ${FRONTEND_DIR:-/home/evan/meetscript-ai}
    image: meetscript-ai:171
    container_name: meetscript-171
    restart: unless-stopped
    # 호스트 포트 직접 노출 안 함 — 앞단 caddy(TLS 종단)만 호스트에 열린다. 평문 8088 이
    # LAN 에 직접 뜨지 않게 한다. caddy 는 compose 내부 네트워크에서 'meetscript:8088' 로 접근.
    expose:
      - "8088"
    env_file:
      - ./.env.deploy
    environment:
      WEB_PORT: "8088"
      TZ: "KST-9"                        # tzdata 미설치 환경용 POSIX 표기(한국, DST 없음)
    volumes:
      # 모델 가중치(읽기전용). 호스트에 미리 1회 배치한 경로를 MODELS_DIR 로 지정.
      # (이 컨테이너에서 꺼내려면: docker cp <컨테이너>:/app/models <호스트경로>)
      - "${MODELS_DIR:?MODELS_DIR(모델 디렉토리 호스트 경로)를 .env.deploy 에 지정하세요}:/app/models:ro"
      # 프롬프트 라이브 마운트(읽기전용). 이미지에도 구워두지만(자체완결), 호스트 git repo 의
      # prompts/ 를 덮어쓴다 → 프롬프트는 요청마다 새로 읽히므로(_load_prompt 캐시 없음)
      # 호스트에서 git pull(또는 직접 편집)만 하면 재빌드/재시작 없이 다음 회의부터 즉시 반영.
      # 추출 고도화의 주 대상: prompts/extract.ko.md (수정 시 prompt_version 올릴 것)
      - "${BACKEND_DIR:-..}/prompts:/app/prompts:ro"
      # SQLite(계정/비번/사용자별 자격증명) + 산출물 영속. host-dir bind 라 호스트에서
      # DB 파일(/opt/meetscript/data/web/meetings.db)을 직접 보고 cp 로 백업/이관 가능.
      # 기존 DB 를 미리 DATA_DIR/web/ 에 놓으면 그대로 승계됨.
      - "${DATA_DIR:?DATA_DIR(DB·산출물 호스트 경로)를 .env.deploy 에 지정하세요}:/app/output"
    # GPU 패스스루(nvidia-container-toolkit 필요).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Compose v2.30+ 에서는 아래 한 줄로도 GPU 할당 가능(위 deploy 블록과 택1).
    # gpus: all
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s                 # 첫 요청 시 모델 로드 시간 고려

  # ----- TLS 리버스 프록시 -----
  # meetscript 앞단에서 HTTPS 를 종단한다(자체 CA). 사용자는 https://<LAN-IP>:HOST_PORT 로
  # 접속. 부수효과로 브라우저 보안 컨텍스트가 충족돼 마이크 녹음이 LAN 에서도 동작한다.
  caddy:
    # 버전 핀(부동 태그 금지) — 무인 이미지 갱신으로 Caddyfile 문법 호환이 깨져 caddy 가
    # 기동 실패하면 전체 외부 접속이 끊기므로(meetscript 는 expose 만). 갱신 시 caddy validate.
    image: caddy:2.8-alpine
    container_name: meetscript-caddy-171
    restart: unless-stopped
    depends_on:
      - meetscript
    environment:
      # Caddyfile 의 {$SITE_HOST} 치환값 = 사용자가 접속하는 171 LAN IP(또는 호스트명).
      # tls internal 이 이 이름으로 인증서를 발급해야 IP 접속이 동작한다. 미설정 시 배포 실패
      # (:? )로 막아, 인증서 이름 누락으로 HTTPS 가 조용히 깨지는 사고를 방지.
      SITE_HOST: "${SITE_HOST:?SITE_HOST(접속 IP/호스트명)를 .env.deploy 에 지정하세요}"
    ports:
      # 호스트 HOST_PORT(기본 49152) -> caddy :443(HTTPS). 0.0.0.0 바인딩.
      - "${HOST_PORT:-49152}:443"
    volumes:
      - "${BACKEND_DIR:-..}/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
      # 내부 CA 키/인증서 영속(재기동마다 CA 가 바뀌어 클라 신뢰가 깨지지 않게).
      - caddy_data:/data
      - caddy_config:/config

# meetscript 데이터는 host-dir bind(DATA_DIR)로 영속. 아래 named volume 은 caddy 의 내부 CA
# 인증서/설정 캐시 전용(사용자 데이터 아님 → named volume 으로 충분).
volumes:
  caddy_data:
  caddy_config:
